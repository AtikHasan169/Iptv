name: Auto Update IPTV Playlist

on:
  schedule:
    - cron: '0 */6 * * *'  # Automatically triggers every 6 hours
  workflow_dispatch:      # Allows you to click a button to run it manually at any time

permissions:
  contents: write         # Explicit instruction to allow changes to be saved

jobs:
  refresh-playlist:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Initialize Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Run verification script
      run: python update_playlist.py

    - name: Commit and push changes back to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add working_channels.m3u
        # The '|| exit 0' avoids error failures if the list didn't change since the last check
        git commit -m "Automated Playlist Update: Only active streams preserved" || exit 0
        git push
