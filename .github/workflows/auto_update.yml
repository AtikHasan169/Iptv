name: Master IPTV & Toffee Updater

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs automatically every 6 hours
  workflow_dispatch:      # Allows you to trigger it manually via the GitHub UI

permissions:
  contents: write         # Required so the bot can push updates to the repo

jobs:
  refresh-playlists:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Initialize Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp requests

    - name: Run Toffee Cookie Update script
      env:
        # Injects the secret safely without exposing it in the logs
        DEVICE_TOKEN: ${{ secrets.TOFFEE_DEVICE_TOKEN }}
      run: python update_toffee.py

    - name: Run IPTV verification script
      run: python update_playlist.py

    - name: Commit and push changes back to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage both of the playlist files
        git add tv.m3u working_channels.m3u
        
        # Only commit if changes were actually made, otherwise exit cleanly
        git commit -m "Automated Playlist Update: Refreshed Toffee CDN cookies & verified streams" || exit 0
        git push
