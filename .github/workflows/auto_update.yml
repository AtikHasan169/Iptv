name: Master IPTV & Toffee Updater

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs automatically every 6 hours
  workflow_dispatch:      # Allows manual triggers via the GitHub UI

permissions:
  contents: write         # Required for the bot to push commits to the repo

jobs:
  refresh-playlists:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Initialize Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp requests

    - name: Run Toffee Cookie Update script
      env:
        # Passes the initial secret for the very first run (or if tokens.json is deleted)
        DEVICE_TOKEN: ${{ secrets.TOFFEE_DEVICE_TOKEN }}
      run: python update_toffee.py

    - name: Run IPTV verification script
      run: python update_playlist.py

    - name: Commit and push changes back to repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage the playlists AND the new tokens.json file
        git add tv.m3u working_channels.m3u tokens.json
        
        # Commit if changes exist, otherwise exit cleanly without failing
        git commit -m "Automated Playlist Update: Refreshed Toffee CDN cookies, updated tokens & verified streams" || exit 0
        git push
